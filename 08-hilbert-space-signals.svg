<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/><stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <radialGradient id="hilbert" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0a0a2e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg8)"/>

  <text x="600" y="50" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="34" font-weight="700">Hilbert Space Compacting — HSC</text>
  <text x="600" y="80" text-anchor="middle" fill="#f9a8d4" font-family="Inter,system-ui,sans-serif" font-size="16">Quantum-inspired intelligence signals from high-dimensional rule spaces</text>

  <!-- Hilbert space visualization (3D-like projection) -->
  <g transform="translate(100,100)">
    <circle cx="250" cy="230" r="200" fill="url(#hilbert)"/>

    <!-- Axes -->
    <line x1="250" y1="230" x2="250" y2="50" stroke="#ec4899" stroke-width="1" opacity="0.5"/>
    <line x1="250" y1="230" x2="430" y2="310" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="250" y1="230" x2="80" y2="310" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
    <text x="255" y="40" fill="#ec4899" font-family="Inter,system-ui,sans-serif" font-size="10">dim_n</text>
    <text x="440" y="315" fill="#8b5cf6" font-family="Inter,system-ui,sans-serif" font-size="10">dim_2</text>
    <text x="55" y="315" fill="#06b6d4" font-family="Inter,system-ui,sans-serif" font-size="10">dim_1</text>

    <!-- Rule vectors as points in space -->
    <circle cx="200" cy="150" r="5" fill="#ec4899" opacity="0.8"/>
    <circle cx="310" cy="180" r="5" fill="#ec4899" opacity="0.8"/>
    <circle cx="280" cy="130" r="5" fill="#f472b6" opacity="0.6"/>
    <circle cx="180" cy="200" r="5" fill="#f472b6" opacity="0.6"/>
    <circle cx="350" cy="250" r="5" fill="#a78bfa" opacity="0.6"/>
    <circle cx="160" cy="260" r="5" fill="#a78bfa" opacity="0.6"/>
    <circle cx="300" cy="290" r="5" fill="#22d3ee" opacity="0.6"/>
    <circle cx="220" cy="300" r="5" fill="#22d3ee" opacity="0.6"/>

    <!-- Conflict detection (red line between close points) -->
    <line x1="200" y1="150" x2="310" y2="180" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <text x="255" y="160" fill="#ef4444" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600">CONFLICT</text>

    <!-- Overlap detection (yellow region) -->
    <ellipse cx="270" cy="130" rx="60" ry="25" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="270" y="108" fill="#f59e0b" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600">OVERLAP</text>

    <!-- Redundancy (near-duplicate cluster) -->
    <circle cx="163" cy="258" r="20" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    <text x="163" y="240" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600">REDUNDANT</text>

    <!-- Label -->
    <text x="250" y="420" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="12">Rules as vectors in 1536-dimensional Hilbert space</text>
    <text x="250" y="440" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Compacting = projecting to intelligence signals</text>
  </g>

  <!-- 7 Signal types -->
  <g transform="translate(620,110)">
    <text x="270" y="0" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700">7 Intelligence Signal Classes</text>

    <!-- Signal 1: Relevance -->
    <rect x="0" y="25" width="540" height="52" rx="10" fill="#1e1b4b" stroke="#ec4899" stroke-width="1"/>
    <circle cx="30" cy="51" r="14" fill="#ec4899" opacity="0.2"/>
    <text x="30" y="55" text-anchor="middle" fill="#ec4899" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">R</text>
    <text x="55" y="48" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Relevance</text>
    <text x="55" y="65" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Which rules apply to a given context? Score-ranked results.</text>

    <!-- Signal 2: Conflict -->
    <rect x="0" y="87" width="540" height="52" rx="10" fill="#1e1b4b" stroke="#ef4444" stroke-width="1"/>
    <circle cx="30" cy="113" r="14" fill="#ef4444" opacity="0.2"/>
    <text x="30" y="117" text-anchor="middle" fill="#ef4444" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">C</text>
    <text x="55" y="110" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Conflict</text>
    <text x="55" y="127" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Where do rules produce contradictory outcomes? Severity rated.</text>

    <!-- Signal 3: Overlap -->
    <rect x="0" y="149" width="540" height="52" rx="10" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1"/>
    <circle cx="30" cy="175" r="14" fill="#f59e0b" opacity="0.2"/>
    <text x="30" y="179" text-anchor="middle" fill="#f59e0b" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">O</text>
    <text x="55" y="172" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Overlap</text>
    <text x="55" y="189" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Where do rule conditions intersect? Intersection percentage.</text>

    <!-- Signal 4: Redundancy -->
    <rect x="0" y="211" width="540" height="52" rx="10" fill="#1e1b4b" stroke="#22c55e" stroke-width="1"/>
    <circle cx="30" cy="237" r="14" fill="#22c55e" opacity="0.2"/>
    <text x="30" y="241" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">D</text>
    <text x="55" y="234" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Redundancy</text>
    <text x="55" y="251" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Which rules are duplicates or near-duplicates? Actionable recommendations.</text>

    <!-- Signal 5: Coverage -->
    <rect x="0" y="273" width="540" height="52" rx="10" fill="#1e1b4b" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="30" cy="299" r="14" fill="#3b82f6" opacity="0.2"/>
    <text x="30" y="303" text-anchor="middle" fill="#3b82f6" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">V</text>
    <text x="55" y="296" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Coverage</text>
    <text x="55" y="313" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">How completely do rules cover a domain? Gap identification.</text>

    <!-- Signal 6: Coherence -->
    <rect x="0" y="335" width="540" height="52" rx="10" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="30" cy="361" r="14" fill="#8b5cf6" opacity="0.2"/>
    <text x="30" y="365" text-anchor="middle" fill="#8b5cf6" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">H</text>
    <text x="55" y="358" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Coherence</text>
    <text x="55" y="375" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Are rules internally consistent? Logical harmony analysis.</text>

    <!-- Signal 7: Topology -->
    <rect x="0" y="397" width="540" height="52" rx="10" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="30" cy="423" r="14" fill="#06b6d4" opacity="0.2"/>
    <text x="30" y="427" text-anchor="middle" fill="#06b6d4" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">T</text>
    <text x="55" y="420" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Topology</text>
    <text x="55" y="437" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Graph structure analysis — components, cycles, diameter, reachability.</text>
  </g>

  <!-- Key guarantee -->
  <rect x="100" y="620" width="1000" height="130" rx="16" fill="#1e1b4b" opacity="0.5" stroke="#ec4899" stroke-width="1"/>
  <text x="600" y="660" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">HSC Guarantee: Signals, Never Decisions</text>
  <text x="600" y="690" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="14">All outputs are advisory, non-authoritative, traceable intelligence signals</text>
  <text x="600" y="715" text-anchor="middle" fill="#f9a8d4" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">Deterministic for identical inputs  |  Cached for performance  |  Never modifies rule state</text>
  <text x="600" y="738" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="12">This separation enables enterprise audit compliance — the AI informs, humans decide</text>
</svg>