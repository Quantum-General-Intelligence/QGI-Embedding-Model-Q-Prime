<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/><stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg14)"/>

  <text x="600" y="55" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="34" font-weight="700">Enterprise Trust Architecture</text>
  <text x="600" y="85" text-anchor="middle" fill="#fcd34d" font-family="Inter,system-ui,sans-serif" font-size="16">Every layer is deterministic, traceable, and auditable by design</text>

  <!-- Trust chain visualization -->
  <!-- Layer 1 -->
  <rect x="100" y="120" width="1000" height="80" rx="12" fill="#1e1b4b" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="150" cy="160" r="22" fill="#22c55e" opacity="0.15"/>
  <text x="150" y="165" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="800">1</text>
  <text x="200" y="152" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Deterministic Parsing</text>
  <text x="200" y="175" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">QNR2 uses pure algorithmic rules — no LLM variance. Same input always produces same AST.</text>
  <rect x="900" y="140" width="170" height="35" rx="8" fill="#052e16" stroke="#22c55e"/>
  <text x="985" y="162" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AUDITABLE</text>

  <!-- Layer 2 -->
  <rect x="100" y="220" width="1000" height="80" rx="12" fill="#1e1b4b" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="150" cy="260" r="22" fill="#3b82f6" opacity="0.15"/>
  <text x="150" y="265" text-anchor="middle" fill="#3b82f6" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="800">2</text>
  <text x="200" y="252" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Immutable Graph State</text>
  <text x="200" y="275" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">QHG graphs are immutable once built. No hidden mutations. Version-controlled knowledge state.</text>
  <rect x="900" y="240" width="170" height="35" rx="8" fill="#172554" stroke="#3b82f6"/>
  <text x="985" y="262" text-anchor="middle" fill="#3b82f6" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">IMMUTABLE</text>

  <!-- Layer 3 -->
  <rect x="100" y="320" width="1000" height="80" rx="12" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="150" cy="360" r="22" fill="#8b5cf6" opacity="0.15"/>
  <text x="150" y="365" text-anchor="middle" fill="#8b5cf6" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="800">3</text>
  <text x="200" y="352" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Advisory-Only Intelligence</text>
  <text x="200" y="375" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">HSC produces signals, never decisions. The system informs humans — it doesn't replace them.</text>
  <rect x="900" y="340" width="170" height="35" rx="8" fill="#2e1065" stroke="#8b5cf6"/>
  <text x="985" y="362" text-anchor="middle" fill="#8b5cf6" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">ADVISORY ONLY</text>

  <!-- Layer 4 -->
  <rect x="100" y="420" width="1000" height="80" rx="12" fill="#1e1b4b" stroke="#ec4899" stroke-width="1.5"/>
  <circle cx="150" cy="460" r="22" fill="#ec4899" opacity="0.15"/>
  <text x="150" y="465" text-anchor="middle" fill="#ec4899" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="800">4</text>
  <text x="200" y="452" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Source-Grounded Answers</text>
  <text x="200" y="475" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">Every claim in every answer is traced back to a specific rule, document, and section.</text>
  <rect x="900" y="440" width="170" height="35" rx="8" fill="#4a0d2b" stroke="#ec4899"/>
  <text x="985" y="462" text-anchor="middle" fill="#ec4899" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">TRACEABLE</text>

  <!-- Layer 5 -->
  <rect x="100" y="520" width="1000" height="80" rx="12" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="150" cy="560" r="22" fill="#f59e0b" opacity="0.15"/>
  <text x="150" y="565" text-anchor="middle" fill="#f59e0b" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="800">5</text>
  <text x="200" y="552" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Full Trace Chain</text>
  <text x="200" y="575" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">Every pipeline step is recorded: intent → slots → query → results → answer → grounding → confidence.</text>
  <rect x="900" y="540" width="170" height="35" rx="8" fill="#422006" stroke="#f59e0b"/>
  <text x="985" y="562" text-anchor="middle" fill="#f59e0b" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">OBSERVABLE</text>

  <!-- Trust equation -->
  <rect x="150" y="640" width="900" height="110" rx="16" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="680" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Trust = Determinism + Traceability + Human Authority</text>
  <text x="600" y="710" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="14">The AI prepares reasoning. Humans make decisions. Every step is auditable.</text>
  <text x="600" y="735" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">This is the architecture regulators and compliance officers actually want.</text>
</svg>