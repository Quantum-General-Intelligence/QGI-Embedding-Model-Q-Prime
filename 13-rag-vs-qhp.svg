<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/><stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg13)"/>

  <text x="600" y="55" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="34" font-weight="700">RAG vs QHP: A Paradigm Shift</text>
  <text x="600" y="85" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="16">From retrieval-augmented to reasoning-first knowledge infrastructure</text>

  <!-- RAG Side -->
  <rect x="40" y="110" width="540" height="620" rx="16" fill="#1e293b" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
  <text x="310" y="145" text-anchor="middle" fill="#ef4444" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Traditional RAG</text>

  <!-- RAG Pipeline -->
  <rect x="70" y="170" width="480" height="45" rx="8" fill="#1e1b4b" stroke="#475569"/>
  <text x="310" y="197" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">Document → Blind chunking (512 tokens)</text>

  <text x="310" y="235" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="18">↓</text>

  <rect x="70" y="250" width="480" height="45" rx="8" fill="#1e1b4b" stroke="#475569"/>
  <text x="310" y="277" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">Embed chunks → Flat vector store</text>

  <text x="310" y="315" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="18">↓</text>

  <rect x="70" y="330" width="480" height="45" rx="8" fill="#1e1b4b" stroke="#475569"/>
  <text x="310" y="357" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">Query → Top-K similar chunks</text>

  <text x="310" y="395" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="18">↓</text>

  <rect x="70" y="410" width="480" height="45" rx="8" fill="#1e1b4b" stroke="#475569"/>
  <text x="310" y="437" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">Stuff chunks into LLM prompt → Generate</text>

  <!-- RAG Problems -->
  <rect x="70" y="480" width="480" height="220" rx="10" fill="#1c1917" stroke="#ef4444" stroke-width="0.5"/>
  <text x="310" y="510" text-anchor="middle" fill="#ef4444" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">Fundamental Limitations</text>

  <g fill="#f87171" font-family="Inter,system-ui,sans-serif" font-size="12">
    <text x="90" y="540">✕  No understanding of rule structure</text>
    <text x="90" y="565">✕  Cannot detect rule conflicts</text>
    <text x="90" y="590">✕  Cannot identify overlapping policies</text>
    <text x="90" y="615">✕  No provenance or grounding</text>
    <text x="90" y="640">✕  Black-box scoring — unexplainable</text>
    <text x="90" y="665">✕  Hallucination risk — no verification</text>
    <text x="90" y="690">✕  N+1 LLM calls for complex queries</text>
  </g>

  <!-- VS -->
  <text x="600" y="430" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800">VS</text>

  <!-- QHP Side -->
  <rect x="620" y="110" width="540" height="620" rx="16" fill="#1e1b4b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="890" y="145" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">QHP Platform</text>

  <!-- QHP Pipeline -->
  <rect x="650" y="170" width="480" height="45" rx="8" fill="#0f2918" stroke="#22c55e" stroke-width="0.5"/>
  <text x="890" y="197" text-anchor="middle" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="13">Document → Semantic extraction (80+ roles)</text>

  <text x="890" y="235" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="18">↓</text>

  <rect x="650" y="250" width="480" height="45" rx="8" fill="#0f2918" stroke="#22c55e" stroke-width="0.5"/>
  <text x="890" y="277" text-anchor="middle" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="13">Normalize → AST + 18 rule types + 4 graph formats</text>

  <text x="890" y="315" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="18">↓</text>

  <rect x="650" y="330" width="480" height="45" rx="8" fill="#0f2918" stroke="#22c55e" stroke-width="0.5"/>
  <text x="890" y="357" text-anchor="middle" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="13">HSC Intelligence → 7 signal types + hybrid search</text>

  <text x="890" y="395" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="18">↓</text>

  <rect x="650" y="410" width="480" height="45" rx="8" fill="#0f2918" stroke="#22c55e" stroke-width="0.5"/>
  <text x="890" y="437" text-anchor="middle" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="13">Grounded answer → traced + scored + auditable</text>

  <!-- QHP Advantages -->
  <rect x="650" y="480" width="480" height="220" rx="10" fill="#052e16" stroke="#22c55e" stroke-width="0.5"/>
  <text x="890" y="510" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">Fundamental Advantages</text>

  <g fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="12">
    <text x="670" y="540">✓  Deep rule structure understanding</text>
    <text x="670" y="565">✓  Automatic conflict detection (HSC)</text>
    <text x="670" y="590">✓  Overlap and redundancy analysis</text>
    <text x="670" y="615">✓  Full provenance chain for every claim</text>
    <text x="670" y="640">✓  Explainable scoring — audit-ready</text>
    <text x="670" y="665">✓  Grounding verification — zero hallucination</text>
    <text x="670" y="690">✓  1-3 LLM calls per document ingestion</text>
  </g>

  <!-- Bottom banner -->
  <rect x="250" y="750" width="700" height="35" rx="17" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="773" text-anchor="middle" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">QHP doesn't augment retrieval — it builds the reasoning infrastructure enterprises actually need</text>
</svg>